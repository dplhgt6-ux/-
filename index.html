<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Прикол сайт</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* по горизонтали */
    align-items: center;    /* по вертикали */
    background-color: #000; /* черный фон */
    font-family: 'Arial', sans-serif;
  }
  h1 {
    font-size: 80px;
    color: #ff0000; /* красный цвет текста */
    text-shadow: 4px 4px 10px #ffffff; /* тень для яркости */
    animation: bounce 2s infinite; /* анимация прыжка */
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
</style>
</head>
<body>
<h1>Катсу Гей</h1>
</body>
</html>
